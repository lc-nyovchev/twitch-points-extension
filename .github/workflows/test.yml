name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      -   name: Checkout
          uses: actions/checkout@v6
      -   name: Setup node
          uses: actions/setup-node@v6
          with:
            node-version-file: '.nvmrc'
      -   name: Install dependencies
          run: npm install
      -   name: Run tests
          run: npm run test